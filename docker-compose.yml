services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shurun_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shurun_password}
      POSTGRES_DB: ${POSTGRES_DB:-shurun_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"

  backend:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-shurun_user}:${POSTGRES_PASSWORD:-shurun_password}@db:5432/${POSTGRES_DB:-shurun_db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:80}
      - BOT_URL=http://bot:3001/api/notify
    depends_on:
      - db
      - bot
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  bot:
    build: ./SHU/bot
    restart: always
    env_file:
      - ./SHU/bot/.env
    ports:
      - "3001:3001"

volumes:
  postgres_data:
